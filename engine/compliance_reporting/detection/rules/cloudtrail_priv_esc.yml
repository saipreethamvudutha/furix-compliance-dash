title: Administrator Policy Attached to IAM User
id: furix-0011-cloudtrail-admin-attach
status: stable
description: AdministratorAccess granted to a user — privilege escalation in AWS.
logsource:
  product: aws
  service: cloudtrail
detection:
  attach:
    eventname: 'AttachUserPolicy'
  admin:
    _raw|contains: 'AdministratorAccess'
  condition: attach and admin
level: critical
tags:
  - attack.privilege-escalation
  - attack.t1098
