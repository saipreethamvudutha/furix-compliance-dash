# Reverse proxy: one origin for the browser. / → dashboard, /api → engine API.
worker_processes auto;
events { worker_connections 1024; }

http {
  sendfile on;
  client_max_body_size 25m;   # allow decent log-file uploads to /api/ingest-file
  proxy_read_timeout 300s;    # ingest can be slow (per-log pipeline + model load)

  upstream furix_web { server web:3000; }
  upstream furix_api { server api:8000; }

  server {
    listen 80;
    server_name _;

    location /api/ {
      proxy_pass http://furix_api;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
      proxy_pass http://furix_web;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header Upgrade $http_upgrade;      # Next.js HMR/websocket (dev)
      proxy_set_header Connection "upgrade";
    }
  }
}
