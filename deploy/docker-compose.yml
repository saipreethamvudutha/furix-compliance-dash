# Furix Compliance — full stack. Run from deploy/:  docker compose up -d
# One-time data bootstrap is a separate runbook step (see deploy/RUNBOOK.md).
name: furix-compliance

services:
  db:
    build: ./db                     # Postgres 16 + Apache AGE + pgvector
    environment:
      POSTGRES_USER: ${PG_USER:-furix}
      POSTGRES_PASSWORD: ${PG_PASSWORD:-postgres}
      POSTGRES_DB: ${PG_DBNAME:-furix_compliance}
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PG_USER:-furix} -d ${PG_DBNAME:-furix_compliance}"]
      interval: 10s
      timeout: 5s
      retries: 12
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest     # serves Gemma (DLQ/unknown-format path only)
    # Opt-in only: NOT started by `docker compose up -d`. Gemma is only used for
    # unknown log formats, and most deploys point GEMMA_BASE_URL at an existing
    # host Ollama. To run this one anyway: `docker compose --profile gemma up -d`.
    profiles: ["gemma"]
    volumes:
      - ollama_models:/root/.ollama
    restart: unless-stopped

  api:
    build: ../engine
    depends_on:
      db:
        condition: service_healthy
    environment:
      PG_HOST: db
      PG_PORT: "5432"
      PG_USER: ${PG_USER:-furix}
      PG_PASSWORD: ${PG_PASSWORD:-postgres}
      PG_DBNAME: ${PG_DBNAME:-furix_compliance}
      PG_DBNAME_DET: ${PG_DBNAME_DET:-furix_det}
      GEMMA_BASE_URL: ${GEMMA_BASE_URL:-http://ollama:11434/v1}
      GEMMA_MODEL: ${GEMMA_MODEL:-gemma4:e4b}
      FURIX_DEVICE: ${FURIX_DEVICE:-cpu}
      # Deterministic verdict without the RAG evidence layer (no SecureBERT
      # download, no pgvector/graph needed). Set to 0 after running setup_ingestion
      # if you want retrieved evidence text.
      FURIX_DISABLE_RAG: ${FURIX_DISABLE_RAG:-1}
      # ATT&CK/Sigma pivot enriches control mapping (log→technique→control) so
      # policy rules fire on attacks the keyword engine misses. 1=on (default).
      FURIX_ATTACK_PIVOT: ${FURIX_ATTACK_PIVOT:-1}
      FURIX_DATA_DIR: /data/source
      FURIX_SCF_JSON: /data/source/scf-full-2026.2.json
      FURIX_NIST_PDF: /data/source/NIST.CSWP.29.pdf
      FURIX_CIS_PDF: /data/source/cis_controls_v8.1.pdf
      FURIX_OUTPUT_DIR: /data/output
      FURIX_REPORT_STORE: /data/reports
      FURIX_CORS_ORIGINS: ${FURIX_CORS_ORIGINS:-http://localhost}
      # Auth (FUR-CMP-004): every data endpoint requires a bearer key. Provide a
      # JSON list of {key,key_id,tenant,role}. Roles: admin|analyst|auditor|mssp.
      #
      # FURIX_ENV defaults to "development" so an internal test box boots out of
      # the box (with LOUD preflight warnings). Set FURIX_ENV=production in .env
      # for a real deployment — production FAILS CLOSED unless real random keys,
      # a durable job DB, and the TLS acknowledgement are configured.
      FURIX_ENV: ${FURIX_ENV:-development}
      FURIX_API_KEYS: ${FURIX_API_KEYS:-[{"key":"furix-dev-key","key_id":"dev","tenant":"default","role":"admin"}]}
      FURIX_JOB_DB: ${FURIX_JOB_DB:-/data/reports/jobs.db}
      FURIX_TLS_TERMINATED: ${FURIX_TLS_TERMINATED:-}
      FURIX_RATE_LIMIT_PER_MIN: ${FURIX_RATE_LIMIT_PER_MIN:-240}
      FURIX_MAX_INGEST_CHARS: ${FURIX_MAX_INGEST_CHARS:-20971520}
    volumes:
      - ./source_data:/data/source   # drop the SCF JSON + PDFs here (host side)
      - furix_reports:/data/reports
      - furix_output:/data/output
      - hf_models:/models            # SecureBERT cache (persists across restarts)
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  web:
    build:
      context: ../dashboard
      args:
        NEXT_PUBLIC_API_URL: ""      # unused by the client now (BFF is same-origin)
    environment:
      # Server-side BFF config (P0-1): the browser never sees these. The Next
      # server attaches FURIX_API_KEY when proxying /bff/* to the api service.
      FURIX_API_URL: http://api:8000
      FURIX_API_KEY: ${FURIX_API_KEY:-furix-dev-key}
    depends_on:
      - api
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      - web
      - api
    ports:
      - "${FURIX_HTTP_PORT:-8088}:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    restart: unless-stopped

volumes:
  db_data:
  ollama_models:
  furix_reports:
  furix_output:
  hf_models:
