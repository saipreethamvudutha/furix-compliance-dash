name: furix-ci

# Runs the full deterministic engine suite, the dashboard build, lint, and
# generates SBOMs on every push / PR (FUR-QA-001). The engine suite is
# dependency-free (stdlib only), so it runs on a clean runner in seconds.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  engine-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Run engine test suite (168 checks, stdlib only)
        working-directory: engine
        run: python run_all_tests.py

  dashboard:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dashboard
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: dashboard/package-lock.json
      - run: npm ci --no-audit --no-fund
      - name: Production dependency audit (blocks on high/critical)
        run: npm audit --omit=dev --audit-level=high
      - name: Build
        run: npm run build
      - name: Lint (zero-error gate)
        run: npm run lint

  sbom:
    runs-on: ubuntu-latest
    needs: [engine-tests, dashboard]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Generate SBOMs (engine + dashboard, CycloneDX)
        run: bash deploy/generate-sbom.sh
      - name: Upload SBOMs
        uses: actions/upload-artifact@v4
        with:
          name: furix-sbom
          path: sbom/
